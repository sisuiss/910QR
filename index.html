<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗限定クーポン</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
    .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 30px; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
    .btn:disabled { background: #ddd; cursor: not-allowed; opacity: 0.6; }
    #qr-container {
      text-align: center;
      background: #f9f9f9;
      padding: 20px;
      border-radius: 10px;
      border: 2px dashed #667eea;
      margin-top: 20px;
      display: none;
    }
    #qr-container.show { display: block; }
    #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 5px; }
    #qrcode canvas { max-width: 100%; height: auto; }
    .qr-info { font-size: 12px; color: #999; margin-top: 15px; }
    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    .message.show { display: block; }
    .message.error { background: #ffebee; color: #c62828; border: 1px solid #ef5350; }
    .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #66bb6a; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;">
      <span style="display:inline-flex; align-items:center; gap:0.3em; max-width:100%;">
        <span style="font-size:1.92em; line-height:1; flex-shrink:0;">🎟️</span>
        <span style="line-height:1.2; text-align:left;">サンプル<br>クーポン</span>
      </span>
    </h1>
    <p class="subtitle">お一人様1回限り</p>
    <button id="issueBtn" class="btn" onclick="generateCoupon()">クーポンを発行する</button>
    <div id="qr-container">
      <div id="qrcode"></div>
      <div class="qr-info"><p>スタッフに提示してください</p></div>
    </div>
    <div id="status-msg" class="message"></div>
  </div>

  <script>
    // ★ GAS WebアプリURLをここに貼り付けてください ★
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxunsirwakmoFVV_jFLRw5mbuYhxW73QnSVRhCn2F4S118DIm7LQHCTasunc80nELG3/exec';

    // ブラウザID生成
    function generateBrowserId() {
      const nav = `${navigator.userAgent}-${navigator.language}-${new Date().getTimezoneOffset()}`;
      let hash = 0;
      for (let i = 0; i < nav.length; i++) {
        hash = ((hash << 5) - hash) + nav.charCodeAt(i);
        hash = hash & hash;
      }
      return `bid_${Math.abs(hash).toString(36).substring(0, 16)}`;
    }

    const BID = generateBrowserId();

    async function gasGet(params) {
      const url = GAS_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      return res.json();
    }

    // ページ読み込み時
    document.addEventListener('DOMContentLoaded', async () => {
      const cachedToken = localStorage.getItem(`coupon_token_${BID}`);

      if (cachedToken) {
        displayUnusedCoupon(cachedToken);
        const result = await gasGet({ action: 'status', bid: BID }).catch(() => null);
        if (result && result.status === '使用済み') displayUsedCoupon();
      } else {
        try {
          const result = await gasGet({ action: 'status', bid: BID });
          initializeScreen(result);
        } catch (e) {
          generateCoupon();
        }
      }
    });

    function initializeScreen(result) {
      if (result.status === '使用済み') {
        displayUsedCoupon();
      } else if (result.status === '未使用') {
        displayUnusedCoupon(result.token, result.url);
      } else {
        generateCoupon();
      }
    }

    async function generateCoupon() {
      document.getElementById('issueBtn').disabled = true;
      document.getElementById('status-msg').classList.remove('show');
      try {
        const result = await gasGet({ action: 'issue', bid: BID });
        if (result.status === 'success') {
          localStorage.setItem(`coupon_token_${BID}`, result.token);
          displayUnusedCoupon(result.token, result.url);
        } else {
          showMessage('error', result.message);
        }
      } catch (e) {
        showMessage('error', 'エラーが発生しました。再読み込みしてください。');
        document.getElementById('issueBtn').disabled = false;
      }
    }

    function displayUsedCoupon() {
      stopPolling();
      document.getElementById('issueBtn').style.display = 'none';
      document.getElementById('qr-container').innerHTML = `
        <div style="padding:30px;text-align:center;">
          <h2 style="color:#4CAF50;font-size:32px;margin-bottom:10px;">✅ 使用済み</h2>
          <p style="color:#666;">クーポンが適用されました</p>
        </div>`;
      document.getElementById('qr-container').classList.add('show');
    }

    function displayUnusedCoupon(token, url) {
      if (!url) {
        url = `https://sisuiss.github.io/910QR/staff.html?token=${encodeURIComponent(token)}`;
      }
      document.getElementById('issueBtn').style.display = 'none';
      document.getElementById('qr-container').classList.add('show');
      displayQRCode(url);
      window.currentToken = token;
      startPolling();
    }

    // ポーリング
    let pollingInterval = null;
    function startPolling() {
      pollingInterval = setInterval(async () => {
        if (!window.currentToken) return;
        try {
          const status = await gasGet({ action: 'check', token: window.currentToken });
          if (status === '使用済み') displayUsedCoupon();
        } catch (e) {}
      }, 3000);
    }
    function stopPolling() {
      if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
    }

    function displayQRCode(url) {
      const qrcodeEl = document.getElementById('qrcode');
      qrcodeEl.innerHTML = '';
      const containerWidth = document.getElementById('qr-container').offsetWidth;
      const size = Math.min(256, containerWidth - 60);
      new QRCode(qrcodeEl, {
        text: url, width: size, height: size,
        colorDark: '#000000', colorLight: '#ffffff'
      });
    }

    function showMessage(type, text) {
      const msg = document.getElementById('status-msg');
      msg.className = `message show ${type}`;
      msg.innerHTML = text;
    }
  </script>
</body>
</html>
