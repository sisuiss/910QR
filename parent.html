<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>店舗限定クーポン</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100vh;
      }
      iframe {
        border: none;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <script>
    window.onload = () => {
      // ★ ここに自分のGAS WebアプリURLを貼り付けてください ★
      const gasAppUrl = 'https://script.google.com/macros/s/AKfycbxb-u4t3QfN01kQggFmOkuhHR0zDZ23xFvF_SPzYftB7RGAm6jH3Sy3UIpkiPOCWaxo/exec';

      const iframe = document.getElementById('gasiframe');
      // URLパラメータ（?token=xxxx など）をGAS側にそのまま渡す
      iframe.src = gasAppUrl + window.location.search;
    };
  </script>
  <body>
    <div>
      <iframe id="gasiframe" src="about:blank"></iframe>
    </div>
  </body>
</html>
