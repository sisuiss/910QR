<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタッフ認証</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 { color: #667eea; margin-bottom: 20px; font-size: 22px; }
    .token-info {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
      font-family: monospace;
    }
    .password-form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
    input {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      text-align: center;
    }
    input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102,126,234,0.3); }
    .btn {
      padding: 15px;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(76,175,80,0.3); }
    .btn:disabled { background: #ddd; cursor: not-allowed; transform: none; }
    .message {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
      display: none;
    }
    .message.show { display: block; }
    .error { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; }
    .success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4CAF50; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔐 スタッフ認証</h2>

    <div class="token-info" id="token-info">
      <strong>トークン:</strong><br>
      <span id="token-display">読み込み中...</span>
    </div>

    <div id="message" class="message"></div>

    <div class="password-form" id="form">
      <input
        type="password"
        id="password"
        placeholder="パスワードを入力"
        onkeypress="if(event.key==='Enter') submitAuth()"
        autofocus
      />
      <button class="btn" id="submitBtn" onclick="submitAuth()">適用</button>
    </div>
  </div>

  <script>
    // ★ GAS WebアプリURLをここに貼り付けてください ★
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxunsirwakmoFVV_jFLRw5mbuYhxW73QnSVRhCn2F4S118DIm7LQHCTasunc80nELG3/exec';

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    document.addEventListener('DOMContentLoaded', () => {
      if (!token) {
        showMessage('error', '無効なURLです。トークンが見つかりません。');
        document.getElementById('form').style.display = 'none';
        return;
      }
      document.getElementById('token-display').textContent = token;
    });

    async function submitAuth() {
      const password = document.getElementById('password').value;
      if (!password) {
        showMessage('error', 'パスワードを入力してください');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '確認中...';

      try {
        const url = GAS_URL + '?' + new URLSearchParams({
          action: 'auth',
          token: token,
          password: password
        }).toString();

        const res = await fetch(url);
        const result = await res.json();

        if (result.status === 'success') {
          document.getElementById('form').style.display = 'none';
          showMessage('success', '✅ 承認成功！<br>クーポンを適用してください');
        } else {
          showMessage('error', '❌ ' + result.message);
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
          btn.disabled = false;
          btn.textContent = '適用';
        }
      } catch (e) {
        showMessage('error', '❌ エラーが発生しました。再試行してください。');
        btn.disabled = false;
        btn.textContent = '適用';
      }
    }

    function showMessage(type, text) {
      const msg = document.getElementById('message');
      msg.className = 'message show ' + type;
      msg.innerHTML = text;
    }
  </script>
</body>
</html>
